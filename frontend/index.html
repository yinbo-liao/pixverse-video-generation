<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixVerse Bridge — Test Console</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
.header { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 20px 24px; }
.header h1 { font-size: 22px; color: #7c5ce7; }
.header p { color: #888; font-size: 13px; margin-top: 4px; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.endpoint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 20px; cursor: pointer; transition: border-color 0.2s; }
.card:hover { border-color: #7c5ce7; }
.card.active { border-color: #7c5ce7; background: #1e1e36; }
.card h3 { font-size: 15px; color: #c0b0f0; margin-bottom: 4px; }
.card .method { font-size: 11px; color: #7c5ce7; font-weight: 600; }
.card p { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.4; }
.editor-panel { display: none; margin-top: 20px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 20px; }
.editor-panel.visible { display: block; }
.editor-panel h2 { font-size: 16px; margin-bottom: 12px; color: #7c5ce7; }
textarea { width: 100%; height: 200px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; padding: 14px; resize: vertical; }
.btn-row { display: flex; gap: 10px; margin-top: 12px; }
button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-send { background: #7c5ce7; color: #fff; }
.btn-send:hover { background: #6a4bd4; }
.btn-fill { background: #2a2a4a; color: #c0b0f0; }
.btn-fill:hover { background: #3a3a5a; }
.response-area { display: none; margin-top: 16px; }
.response-area.visible { display: block; }
.response-area h3 { font-size: 14px; margin-bottom: 8px; }
.response-area .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.response-area .status.ok { background: #1a4a1a; color: #4ae04a; }
.response-area .status.err { background: #4a1a1a; color: #e04a4a; }
pre { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 14px; overflow-x: auto; font-size: 12px; max-height: 400px; overflow-y: auto; color: #c0b0f0; }
.tags { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
.tag { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.tag.post { background: #4a2a1a; color: #e08a4a; }
.tag.get { background: #1a4a2a; color: #4ae08a; }
</style>
</head>
<body>
<div class="header">
  <h1>PixVerse Bridge — Test Console</h1>
  <p>Select an endpoint, edit the JSON payload, and send. Server: localhost:8001</p>
</div>
<div class="container">
  <div class="endpoint-grid" id="endpointGrid"></div>
  <div class="editor-panel" id="editorPanel">
    <h2 id="editorTitle">Request</h2>
    <textarea id="requestBody" spellcheck="false"></textarea>
    <div class="btn-row">
      <button class="btn-send" onclick="sendRequest()">Send Request</button>
      <button class="btn-fill" onclick="fillDefaults()">Fill Defaults</button>
    </div>
    <div class="response-area" id="responseArea">
      <h3>Response <span class="status" id="statusBadge"></span></h3>
      <pre id="responseBody"></pre>
    </div>
  </div>
</div>

<script>
const BASE = 'http://localhost:8001';

const endpoints = [
  { id: 'generate', title: 'Generate (Single Prompt)', method: 'POST', path: '/v1/bridge/generate',
    desc: 'Transform a narrative concept into a PixVerse V6 LPD prompt.', phase: 'Phase 1',
    defaults: { prompt: 'A steaming cup of coffee on a wooden table at sunrise', style: { enthusiasm: 0.1, formality: 0.5 }, constraints: { tone: 'soft' } } },
  { id: 'shot-sequence', title: 'Shot Sequence (Multi-Shot)', method: 'POST', path: '/v1/bridge/shot-sequence',
    desc: 'Generate a multi-shot sequence with drone establishing → medium detail → close-up.', phase: 'Phase 2',
    defaults: { anchor: 'a red Ferrari', base_prompt: 'speeding along a coastal highway at sunset', shots: [ { shot_index: 0, shot_type: 'wide' }, { shot_index: 1, shot_type: 'medium' }, { shot_index: 2, shot_type: 'close-up' } ] } },
  { id: 'feedback-loop', title: 'Feedback Loop (3-Gen Rule)', method: 'POST', path: '/v1/bridge/feedback-loop',
    desc: 'Generate 3 variations, detect 6 artifact types, refine, and select best.', phase: 'Phase 3',
    defaults: { prompt: 'A detective runs frantically through a flashing neon alley at night', style: { enthusiasm: 0.7 }, max_iterations: 2 } },
  { id: 'parameter-injection', title: 'Parameter Injection', method: 'POST', path: '/v1/bridge/parameter-injection',
    desc: 'Map style vectors to camera, lens, motion, lighting, and render settings.', phase: 'Phase 4',
    defaults: { prompt: 'A fashion model walks down a runway', style: { formality: 0.9, enthusiasm: 0.3, technical_depth: 0.8 }, aspect_ratio: '9:16' } },
  { id: 'concept-fusion', title: 'Concept Fusion', method: 'POST', path: '/v1/bridge/concept-fusion',
    desc: 'Blend 2-5 concepts into one unified scene with foreground/background roles.', phase: 'Phase 4',
    defaults: { concepts: [ { prompt: 'a sleek sports car', role: 'foreground', weight: 1.2 }, { prompt: 'a neon-lit city at night', role: 'background', weight: 0.8 } ], unifying_theme: 'cyberpunk racing' } },
  { id: 'production-pipeline', title: 'Production Pipeline (E2E)', method: 'POST', path: '/v1/bridge/production-pipeline',
    desc: 'Full workflow: Concept Fusion → Parameter Injection → Shot Sequence → Feedback.', phase: 'Phase 5',
    defaults: { prompt: 'A lone samurai walks through a bamboo forest at dawn', concepts: [ { prompt: 'a weathered samurai in worn armor', role: 'foreground', weight: 1.2 }, { prompt: 'misty bamboo forest', role: 'background', weight: 0.8 } ], style: { formality: 0.7, enthusiasm: 0.3 }, target_duration: 8, shot_count: 3, max_feedback_iterations: 1 } }
];

let activeEndpoint = endpoints[0];

function renderGrid() {
  const grid = document.getElementById('endpointGrid');
  grid.innerHTML = endpoints.map((ep, i) => `
    <div class="card ${i === 0 ? 'active' : ''}" onclick="selectEndpoint(${i})">
      <span class="method">${ep.method}</span>
      <h3>${ep.title}</h3>
      <p>${ep.desc}</p>
      <div class="tags">
        <span class="tag post">${ep.method}</span>
        <span class="tag get">${ep.phase}</span>
      </div>
    </div>
  `).join('');
}

function selectEndpoint(i) {
  activeEndpoint = endpoints[i];
  document.querySelectorAll('.card').forEach((c, j) => c.classList.toggle('active', j === i));
  document.getElementById('editorPanel').classList.add('visible');
  document.getElementById('editorTitle').textContent = `${activeEndpoint.method} ${activeEndpoint.path} — ${activeEndpoint.title}`;
  document.getElementById('requestBody').value = JSON.stringify(activeEndpoint.defaults, null, 2);
  document.getElementById('responseArea').classList.remove('visible');
}

function fillDefaults() {
  document.getElementById('requestBody').value = JSON.stringify(activeEndpoint.defaults, null, 2);
  document.getElementById('responseArea').classList.remove('visible');
}

async function sendRequest() {
  const area = document.getElementById('responseArea');
  const pre = document.getElementById('responseBody');
  const badge = document.getElementById('statusBadge');
  area.classList.add('visible');
  pre.textContent = 'Sending...';
  try {
    const body = document.getElementById('requestBody').value;
    const res = await fetch(`${BASE}${activeEndpoint.path}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
    const json = await res.json();
    pre.textContent = JSON.stringify(json, null, 2);
    badge.textContent = res.status < 400 ? res.status + ' OK' : res.status + ' Error';
    badge.className = 'status ' + (res.status < 400 ? 'ok' : 'err');
  } catch (e) {
    pre.textContent = 'Connection failed! Is the server running?\n\n' + e.message;
    badge.textContent = 'Error';
    badge.className = 'status err';
  }
}

renderGrid();
selectEndpoint(0);
</script>
</body>
</html>
